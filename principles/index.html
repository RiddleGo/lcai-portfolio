<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人生宪法 · Russshare</title>
  <link rel="stylesheet" href="../kb-theme.css">
  <link rel="stylesheet" href="../portal-home.css">
  <style>
    .md-body { line-height: 1.85; max-width: 720px; }
    .md-body h1 { font-family: var(--kb-serif); font-size: 1.75rem; margin-bottom: 12px; }
    .md-body h2 { font-size: 1.1rem; margin: 28px 0 10px; color: var(--kb-navy); }
    .md-body table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.92rem; }
    .md-body th, .md-body td { border: 1px solid var(--kb-border); padding: 8px 10px; text-align: left; }
    .md-body blockquote { margin: 12px 0; padding: 10px 14px; background: var(--kb-bg2); border-left: 3px solid var(--kb-gold); color: var(--kb-text2); }
    .md-body a { color: var(--kb-link); }
    .principles-links { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .principles-links a { font-size: 0.88rem; text-decoration: none; padding: 6px 12px; border: 1px solid var(--kb-border); border-radius: 8px; color: var(--kb-text); }
    .principles-links a.active { border-color: var(--kb-gold); background: var(--kb-gold-glow); }
  </style>
</head>
<body class="kb-body">
  <button type="button" class="kb-hamburger" aria-label="打开菜单">☰</button>
  <aside class="kb-sidebar" id="kb-sidebar">
    <div class="kb-sidebar-header"></div>
    <nav class="kb-sidebar-nav" id="kb-sidebar-nav"></nav>
    <div class="kb-sidebar-foot"><a href="../index.html">← 首页</a></div>
  </aside>
  <main class="kb-main">
    <div class="kb-page-wrap">
      <section class="kb-hero-section kb-hero-section--compact">
        <h1 class="kb-hero-title">人生 <span class="gold">宪法</span></h1>
        <p class="kb-hero-sub">10 条铁律 · 阶段优先 · 先活下来再复利</p>
      </section>
      <div class="kb-main-inner">
        <nav class="principles-links" aria-label="文档">
          <a href="index.html" class="active" data-doc="life-constitution.md">宪法正文</a>
          <a href="index.html?doc=../goals/life-phases.md" data-doc="../goals/life-phases.md">人生阶段</a>
          <a href="../goals/index.html">OKR →</a>
        </nav>
        <div id="md-content" class="md-body"></div>
      </div>
    </div>
  </main>
  <script src="../site-nav-data.js"></script>
  <script src="../kb-shell.js"></script>
  <script src="../module-shell.js"></script>
  <script src="../md-view.js"></script>
  <script>
    ModuleShell.initModulePage({ activeId: "constitution", base: "../" });
    var doc = new URLSearchParams(location.search).get("doc") || "life-constitution.md";
    document.querySelectorAll(".principles-links a[data-doc]").forEach(function (a) {
      if (a.dataset.doc === doc) a.classList.add("active");
      else a.classList.remove("active");
    });
    if (doc.indexOf("..") === 0) {
      MdView.fetchRender(document.getElementById("md-content"), doc, { basePath: "../" });
    } else {
      MdView.fetchRender(document.getElementById("md-content"), doc, { basePath: "" });
    }
  </script>
</body>
</html>
