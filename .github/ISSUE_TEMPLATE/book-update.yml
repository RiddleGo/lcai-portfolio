name: 更新书籍笔记（网页）
description: 从资产总览「书籍」Tab 提交后，粘贴 JSON 正文
title: "[book] update"
labels:
  - book-bot
body:
  - type: markdown
    value: |
      标题请保持：`[book] update` 或 `[book] b019-9a3426`

      正文请粘贴网页编辑器生成的 **完整 JSON 代码块**（含 \`\`\`json ... \`\`\`）。
      提交后 Actions 约 2–5 分钟更新书籍文件与索引（**不会**自动重算全部报告）。
  - type: textarea
    id: payload
    attributes:
      label: JSON 正文（从网页「复制正文」粘贴）
      description: 须包含 book_id、frontmatter_patch、body_md
    validations:
      required: true
