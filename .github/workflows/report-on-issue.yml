name: Report on issue request

# 新票首次收藏：网页打开 Issue 提交后自动入队 watchlist + 生成报告（持仓/已有关注无需 Issue）
on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  generate-from-issue:
    if: |
      contains(github.event.issue.title, '[report]') &&
      !contains(github.event.issue.title, '[weekly]') &&
      (github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'COLLABORATOR' ||
       github.event.issue.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse symbol from issue title
        id: parse
        run: |
          TITLE="${{ github.event.issue.title }}"
          SYMBOL=$(echo "$TITLE" | sed -n 's/.*\[report\][[:space:]]*\([0-9][0-9]*\).*/\1/p' | head -1)
          if [ -z "$SYMBOL" ]; then
            echo "Could not parse symbol from: $TITLE" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "symbol=$SYMBOL" >> "$GITHUB_OUTPUT"
          echo "Parsed symbol: **$SYMBOL**" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Generate reports
        run: |
          python scripts/generate_reports.py --symbol "${{ steps.parse.outputs.symbol }}"
          python scripts/watchlist_utils.py add "${{ steps.parse.outputs.symbol }}"

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ watchlist-data.js
          git diff --staged --quiet || git commit -m "chore: report for ${{ steps.parse.outputs.symbol }} via issue #${{ github.event.issue.number }}"
          git push

      - name: Close issue with comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "✅ LCAI 研判已生成并推送至 \`reports/${{ steps.parse.outputs.symbol }}/\`

          - 融合报告：[unified.json](https://github.com/${{ github.repository }}/blob/main/reports/${{ steps.parse.outputs.symbol }}/unified.json)
          - 网页：[资产总览 · 选股](https://riddlego.github.io/lcai-portfolio/资产总览.html#screen)

          刷新后重新点「帮我看看」即可读取缓存。"
          gh issue close "${{ github.event.issue.number }}"

  add-holding-from-issue:
    if: |
      contains(github.event.issue.title, '[holding]') &&
      (github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'COLLABORATOR' ||
       github.event.issue.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Parse holding request
        id: parse
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          SYMBOL=$(echo "$ISSUE_TITLE" | sed -n 's/.*\[holding\][[:space:]]*\([0-9][0-9]*\).*/\1/p' | head -1)
          if [ -z "$SYMBOL" ]; then
            echo "Could not parse symbol from: $ISSUE_TITLE" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "symbol=$SYMBOL" >> "$GITHUB_OUTPUT"
          echo "Parsed holding: **$SYMBOL**" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Add holding and sync
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/add_holding_from_issue.py

      - name: Commit holdings and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add holdings.json holdings-data.js quotes-data.js reports/ watchlist-data.js
          git diff --staged --quiet || git commit -m "chore: add holding ${{ steps.parse.outputs.symbol }} via issue #${{ github.event.issue.number }}"
          git push

      - name: Close issue with comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "✅ 已写入 \`holdings.json\` 并同步行情与 LCAI 报告。

          - 持仓页刷新 [资产总览](https://riddlego.github.io/lcai-portfolio/资产总览.html#stock) 即可看到（约 1 分钟）
          - 研判页 [选股](https://riddlego.github.io/lcai-portfolio/资产总览.html#screen) 将显示「已持仓」分支"
          gh issue close "${{ github.event.issue.number }}"

  criteria-from-issue:
    if: |
      contains(github.event.issue.title, '[criteria]') &&
      (github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'COLLABORATOR' ||
       github.event.issue.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Apply criteria from issue
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/apply_criteria_from_issue.py

      - name: Commit criteria and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 投资系统/criteria.json 投资系统/criteria-摘要.md reports/
          git diff --staged --quiet || git commit -m "chore: update criteria via issue #${{ github.event.issue.number }}"
          git push

      - name: Close issue with comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "✅ 判定标准已更新，并已重算 LCAI 报告。

          - 网页查看：[资产总览 · 规则](https://riddlego.github.io/lcai-portfolio/资产总览.html#criteria)
          - 选股研判：[资产总览 · 选股](https://riddlego.github.io/lcai-portfolio/资产总览.html#screen)

          约 1 分钟后刷新页面即可。"
          gh issue close "${{ github.event.issue.number }}"

  weekly-from-issue:
    if: |
      contains(github.event.issue.title, '[weekly]') &&
      (github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'COLLABORATOR' ||
       github.event.issue.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Generate all LCAI reports
        run: python scripts/generate_reports.py --all

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ watchlist-data.js
          git diff --staged --quiet || git commit -m "chore: weekly LCAI refresh via issue #${{ github.event.issue.number }}"
          git push

      - name: Close issue with comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "✅ 持仓 + 关注列表全量 LCAI 报告已刷新。

          - 网页：[资产总览 · 选股](https://riddlego.github.io/lcai-portfolio/资产总览.html#screen)
          - 约 1–2 分钟后刷新页面即可读取最新缓存。"
          gh issue close "${{ github.event.issue.number }}"
