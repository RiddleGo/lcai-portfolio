name: Report on issue request

# 网页「云端研报」打开 GitHub Issue 并提交后自动运行（无需 PAT / Worker）
on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  generate-from-issue:
    if: |
      contains(github.event.issue.title, '[report]') &&
      (github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'COLLABORATOR' ||
       github.event.issue.author_association == 'MEMBER')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse symbol from issue title
        id: parse
        run: |
          TITLE="${{ github.event.issue.title }}"
          SYMBOL=$(echo "$TITLE" | sed -n 's/.*\[report\][[:space:]]*\([0-9][0-9]*\).*/\1/p' | head -1)
          if [ -z "$SYMBOL" ]; then
            echo "Could not parse symbol from: $TITLE" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "symbol=$SYMBOL" >> "$GITHUB_OUTPUT"
          echo "Parsed symbol: **$SYMBOL**" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Clone UZI-Skill
        run: |
          git clone --depth 1 https://github.com/wbh604/UZI-Skill.git .vendor/UZI-Skill || true
          if [ -f .vendor/UZI-Skill/requirements.txt ]; then
            pip install -r .vendor/UZI-Skill/requirements.txt || true
          fi

      - name: Generate reports
        run: |
          python scripts/generate_uzi_reports.py \
            --symbol "${{ steps.parse.outputs.symbol }}" \
            --run-uzi \
            --uzi-path .vendor/UZI-Skill
          python scripts/watchlist_utils.py add "${{ steps.parse.outputs.symbol }}"

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ watchlist-data.js
          git diff --staged --quiet || git commit -m "chore: report for ${{ steps.parse.outputs.symbol }} via issue #${{ github.event.issue.number }}"
          git push

      - name: Close issue with comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "✅ 研报已生成并推送至 \`reports/${{ steps.parse.outputs.symbol }}/\`

          - 摘要：[lcai-vs-uzi.json](https://github.com/${{ github.repository }}/blob/main/reports/${{ steps.parse.outputs.symbol }}/lcai-vs-uzi.json)
          - 网页：[资产总览 · 选股](https://riddlego.github.io/lcai-portfolio/资产总览.html#screen)

          本页轮询会自动更新；也可刷新后重新研判。"
          gh issue close "${{ github.event.issue.number }}"
