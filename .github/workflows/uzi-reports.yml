name: Generate UZI reports

on:
  schedule:
    # 每周一 UTC 01:00 ≈ 北京时间 09:00
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      symbol:
        description: "Single symbol (empty = all holdings from quotes-data.js)"
        required: false
        default: ""
        type: string
      run_uzi:
        description: "Run UZI run.py (slow, needs network)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  uzi-reports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LCAI dependencies
        run: pip install requests urllib3

      - name: Clone UZI-Skill (optional)
        run: |
          git clone --depth 1 https://github.com/wbh604/UZI-Skill.git .vendor/UZI-Skill || true
          if [ -f .vendor/UZI-Skill/requirements.txt ]; then
            pip install -r .vendor/UZI-Skill/requirements.txt || true
          fi

      - name: Generate LCAI report bundles
        env:
          RUN_UZI: ${{ github.event.inputs.run_uzi || 'false' }}
          SYMBOL: ${{ github.event.inputs.symbol || '' }}
        run: |
          EXTRA=""
          if [ "$RUN_UZI" = "true" ] && [ -f .vendor/UZI-Skill/run.py ]; then
            EXTRA="--run-uzi"
          else
            EXTRA="--skip-uzi"
          fi
          if [ -n "$SYMBOL" ]; then
            python scripts/generate_uzi_reports.py --symbol "$SYMBOL" $EXTRA --uzi-path .vendor/UZI-Skill
          else
            python scripts/generate_uzi_reports.py --holdings $EXTRA --uzi-path .vendor/UZI-Skill
          fi

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore: update LCAI/UZI report bundles for holdings"
          git push
