name: LCAI engine check

on:
  push:
    branches: [main]
    paths:
      - "投资系统/**"
      - "screen-engine.js"
      - "screen-data.js"
      - "tests/**"
      - "scripts/check_engine_parity.py"
      - "scripts/lcai_screen_json.py"
      - "scripts/validate_criteria.py"
      - "scripts/build_books_index.py"
      - "书籍/**"
      - "books-index-data.js"
  pull_request:
    paths:
      - "投资系统/**"
      - "screen-engine.js"
      - "screen-data.js"
      - "tests/**"
      - "scripts/check_engine_parity.py"
      - "scripts/lcai_screen_json.py"
      - "scripts/validate_criteria.py"
      - "scripts/build_books_index.py"
      - "书籍/**"
      - "books-index-data.js"

jobs:
  engine-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate books index, criteria, and run engine tests
        run: |
          python scripts/build_books_index.py --check
          python scripts/validate_criteria.py
          python scripts/check_engine_parity.py
