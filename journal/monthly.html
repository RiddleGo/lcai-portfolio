<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月度反思 · Russshare</title>
  <link rel="stylesheet" href="../kb-theme.css">
  <link rel="stylesheet" href="../portal-home.css">
  <link rel="stylesheet" href="../settings/sync.css">
  <style>
    .monthly-template { background: var(--kb-bg2); padding: 14px 16px; border-radius: 10px; font-size: 0.88rem; color: var(--kb-text2); margin-bottom: 16px; line-height: 1.7; }
    .monthly-editor { width: 100%; min-height: 360px; font-family: inherit; font-size: 0.95rem; line-height: 1.75; padding: 14px; border: 1px solid var(--kb-border); border-radius: 10px; resize: vertical; }
  </style>
</head>
<body class="kb-body">
  <button type="button" class="kb-hamburger" aria-label="打开菜单">☰</button>
  <aside class="kb-sidebar" id="kb-sidebar">
    <div class="kb-sidebar-header"></div>
    <nav class="kb-sidebar-nav" id="kb-sidebar-nav"></nav>
    <div class="kb-sidebar-foot"><a href="index.html">← 日记</a></div>
  </aside>
  <main class="kb-main">
    <div class="kb-page-wrap">
      <section class="kb-hero-section kb-hero-section--compact">
        <h1 class="kb-hero-title">月度 <span class="gold">反思</span></h1>
        <p class="kb-hero-sub" id="monthly-subtitle">—</p>
      </section>
      <div class="kb-main-inner">
        <div class="monthly-template">
          <strong>每月 1 次</strong>（建议每月最后一天或次月前 3 天）：<br>
          ① 本月最重要 3 件事 &nbsp; ② 财务/健康/职业/阅读各 1 句 &nbsp; ③ 下月只保留 1 个重点 &nbsp; ④ 需要写决策日记的事
        </div>
        <textarea id="monthly-body" class="monthly-editor" placeholder="在此写本月反思…"></textarea>
        <div class="sync-btn-row" style="margin-top:14px">
          <button type="button" class="sync-btn sync-btn-primary" id="monthly-save">保存</button>
          <a href="../goals/index.html" class="sync-btn" style="text-decoration:none;line-height:1.4">OKR →</a>
        </div>
        <p class="module-page-desc" id="monthly-status"></p>
      </div>
    </div>
  </main>
  <script src="../site-nav-data.js"></script>
  <script src="../kb-shell.js"></script>
  <script src="../module-shell.js"></script>
  <script src="../supabase-config.js"></script>
  <script src="../life-sync.js"></script>
  <script>
    ModuleShell.initModulePage({ activeId: "journal", base: "../" });

    var DEFAULT_BODY =
      "## 本月最重要 3 件事\n\n1. \n2. \n3. \n\n## 五维一句话\n\n- 财务：\n- 健康：\n- 阅读：\n- 职业：\n- 决策/关系：\n\n## 做对了什么\n\n\n## 做错了什么 / 不再重复\n\n\n## 下月只保留 1 个重点\n\n\n## 需要决策日记的事\n\n";

    function monthKey(d) {
      d = d || new Date();
      return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
    }

    function entryId(key) {
      return "monthly-" + key;
    }

    function loadEntry(key) {
      if (!window.LifeSync) return null;
      return LifeSync.getNote(entryId(key));
    }

    function boot() {
      var key = monthKey();
      var sub = document.getElementById("monthly-subtitle");
      if (sub) {
        sub.innerHTML =
          key +
          ' · 已并入 <a href="../reflect/index.html?kind=monthly">反思笔记</a>';
      }

      var ta = document.getElementById("monthly-body");
      var existing = loadEntry(key);
      ta.value = existing && existing.body ? existing.body : DEFAULT_BODY;

      document.getElementById("monthly-save").addEventListener("click", function () {
        if (!window.LifeSync) {
          alert("需要 life-sync.js");
          return;
        }
        LifeSync.saveNote({
          id: entryId(key),
          kind: "monthly",
          title: key + " 月度总结",
          date: new Date().toISOString().slice(0, 10),
          body: ta.value,
        });
        document.getElementById("monthly-status").textContent = "已保存 · " + new Date().toLocaleTimeString();
      });
    }

    LifeSync.init().then(boot).catch(boot);
  </script>
</body>
</html>
