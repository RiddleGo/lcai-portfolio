<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康 · Russshare</title>
  <link rel="stylesheet" href="../kb-theme.css">
  <link rel="stylesheet" href="../portal-home.css">
  <link rel="stylesheet" href="../settings/sync.css">
</head>
<body class="kb-body">
  <button type="button" class="kb-hamburger" aria-label="打开菜单">☰</button>
  <aside class="kb-sidebar" id="kb-sidebar">
    <div class="kb-sidebar-header"></div>
    <nav class="kb-sidebar-nav" id="kb-sidebar-nav"></nav>
    <div class="kb-sidebar-foot"><a href="../index.html">← 首页</a></div>
  </aside>
  <main class="kb-main">
    <div class="kb-page-wrap">
      <section class="kb-hero-section kb-hero-section--compact">
        <h1 class="kb-hero-title">健康 <span class="gold">计划</span></h1>
        <p class="kb-hero-sub" id="health-hero-sub">减脂 · 三分化训练</p>
      </section>
      <div class="kb-main-inner">
        <div class="module-card-grid" style="margin-bottom:20px">
          <div class="module-stat-card">
            <div class="module-stat-label">连续达标</div>
            <div class="module-stat-value"><span id="health-streak">0</span> 天</div>
          </div>
          <div class="module-stat-card">
            <div class="module-stat-label">核心三项</div>
            <div class="module-stat-value" id="health-today-count">0 / 3</div>
          </div>
        </div>

        <h2 class="kb-section-title">今日训练</h2>
        <div id="health-plan-today"></div>

        <h2 class="kb-section-title">今日打卡</h2>
        <div class="health-check-grid" id="health-check-grid"></div>

        <h2 class="kb-section-title" style="margin-top:28px">周计划 · 三分化</h2>
        <div class="module-card-grid" id="health-pillars-grid"></div>

        <h2 class="kb-section-title" style="margin-top:28px">规则</h2>
        <div id="health-plan-rules" class="module-page-desc"></div>

        <h2 class="kb-section-title" style="margin-top:28px">近 7 日</h2>
        <div class="module-card-grid" id="health-week-grid"></div>
      </div>
    </div>
  </main>
  <script src="../site-nav-data.js"></script>
  <script src="../kb-shell.js"></script>
  <script src="../module-shell.js"></script>
  <script src="../supabase-config.js"></script>
  <script src="../life-sync.js"></script>
  <script src="health-view.js"></script>
  <script>
    ModuleShell.initModulePage({ activeId: "health", base: "../" });
    HealthView.init();
  </script>
</body>
</html>
