<!DOCTYPE html>
<html lang="zh-CN">
<head>

<body class="kb-body">
  <button type="button" class="kb-hamburger" aria-label="打开菜单">☰</button>
  <aside class="kb-sidebar" id="kb-sidebar">

    <nav class="kb-sidebar-nav" id="kb-sidebar-nav"></nav>
    <div class="kb-sidebar-foot"><a href="../index.html">← 首页</a></div>
  </aside>
  <main class="kb-main">
    <div class="kb-page-wrap">
      <section class="kb-hero-section kb-hero-section--compact">
        <h1 class="kb-hero-title">反思 <span class="gold">与总结</span></h1>
        <p class="kb-hero-sub">本地撰写 · 登录后自动上云</p>

          <button type="button" class="reflect-tab" data-kind="monthly">月总结</button>
          <button type="button" class="reflect-tab" data-kind="summary">总结</button>

        <div id="reflect-list"></div>

  <script src="../site-nav-data.js"></script>

    ModuleShell.initModulePage({ activeId: "reflect", base: "../" });
    LifeSync.init().then(function () { ReflectView.init(); });
